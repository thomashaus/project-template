openapi: "3.1.0"
info:
  title: API Gateway
  version: "0.1.0"
  description: Public-facing REST API

servers:
  - url: http://localhost:3000/api/v1
    description: Local development

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check endpoint
      tags: [system]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                timestamp: "2026-01-01T00:00:00Z"

components:
  parameters:
    CursorParam:
      name: cursor
      in: query
      description: Pagination cursor
      schema:
        type: string

    LimitParam:
      name: limit
      in: query
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        timestamp:
          type: string
          format: date-time

    BaseEntity:
      type: object
      required: [id, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProblemDetail:
      type: object
      description: RFC 7807 error response
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
