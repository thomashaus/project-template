# Gitleaks Configuration
# https://github.com/gitleaks/gitleaks
#
# Usage:
#   gitleaks detect --config .gitleaks.toml --no-banner
#   gitleaks detect --source . --config .gitleaks.toml --no-banner

title = "Gitleaks Configuration"

# Extend the default gitleaks configuration
[extend]
useDefault = true

# Allowlist for false positives
[allowlist]
description = "Global allowlist for common false positives"

# Paths to ignore
paths = [
  '''node_modules/''',
  '''.git/''',
  '''test/''',
  '''tests/''',
  '''temp/''',
  '''tmp/''',
  '''dist/''',
  '''build/''',
  '''.claude/''',
  '''.env.example''',
]

# Allow example/placeholder credentials
regexes = [
  '''your-secret-key-here''',
  '''your-.*-here''',
  '''your_.*_here''',
  '''CHANGE_ME''',
  '''REPLACE_ME''',
  '''xxx''',
  '''example''',
  '''dummy''',
  '''placeholder''',
  '''test''',
  '''localhost''',
  '''127\.0\.0\.1''',
  '''example\.com''',
  '''test\.com''',
]
