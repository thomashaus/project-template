# .pre-commit-config.yaml
# ============================================================
# Portable quality gates — works for anyone who clones the repo,
# not just Claude Code users.
#
# Install once:
#   pip install pre-commit
#   pre-commit install
#
# Run manually: pre-commit run --all-files

repos:
  # ── Secret Scanning ──
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: ['--no-git']  # Only scan staged files, fast local check
        fail_fast: true     # Stop immediately if secrets found

  # ── General File Hygiene ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
        fail_fast: true     # Stop immediately if private key found
      - id: check-added-large-files
        args: ['--maxkb=250']  # Reduced from 500KB for better security

  # ── Project Validation ──
  - repo: local
    hooks:
      - id: npm-typecheck
        name: TypeScript type check
        entry: npm run typecheck
        language: system
        pass_filenames: false
        files: '^(services/api-gateway|services/.*/).*\.ts$'

      - id: npm-spec-validate
        name: Validate API specs
        entry: npm run spec:validate
        language: system
        pass_filenames: false
        files: '^specs/.*\.(yaml|yml)$'
