# .github/workflows/ci.yml
# ============================================================
# Replaces test.yml with a more complete CI pipeline.
# Covers both Node.js gateway and Python worker service.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Secret Scanning
  # ──────────────────────────────────────────────
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # API Gateway (Node.js / TypeScript)
  # ──────────────────────────────────────────────
  gateway:
    name: API Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --coverage

      - name: Build
        run: npm run build

      - name: Validate specs
        run: npm run spec:validate

  # ──────────────────────────────────────────────
  # Worker Service (Python / FastAPI)
  # ──────────────────────────────────────────────
  worker:
    name: Worker Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/worker-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy . || true  # Advisory until mypy config stabilizes

      - name: Tests
        run: uv run pytest -v --tb=short
